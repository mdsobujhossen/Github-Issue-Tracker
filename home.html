<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style/index.css">
</head>

<body class="bg-[#F8FAFC]">

    <header class="flex justify-between container w-11/12 mx-auto">
        <div class="flex  items-center gap-1 py-5">
            <img class="max-w-9" src="assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-4 items-center">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute top-3.5 left-4 text-[#64748B] -z-10] "></i>
                <input id="search-input" class="bg-white px-5 py-2 pl-10 rounded-md text[#64748B] border border-[#64748B]" type="text"
                    name="" id="search-input" placeholder="search issue">
            </div>

            <button id="search-btn" class="btn btn-primary">+ New issue</button>
        </div>
    </header>

    <main class="container w-11/12 mx-auto mt-10">
        <!-- tab section -->
        <section class="space-x-2 bg-white p-5 rounded-lg shadow mb-5">
            <button onclick="selectTab('all')" id="all" class="btn btn-primary ">All</button>
            <button onclick="selectTab('open')" id="open" class="btn">Open</button>
            <button onclick="selectTab('closed')" id="closed" class="btn">Closed</button>
        </section>

        <!-- issue counter section -->
        <section class=" bg-white p-5 rounded-t-lg rounded-tl-lg shadow flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="assets/Aperture.png" alt="">
                <div>
                    <p class="font-semibold"><span id="issueCount"></span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-5">
                <p class="font-semibold"><i class="fa-solid fa-circle text-[#00A96E] text-[12px] pr-3"></i> Open</p>
                <p class="font-semibold"><i class="fa-solid fa-circle text-[#A855F7] text-[12px] pr-3"></i> Closed</p>
            </div>
        </section>


        <!-- card container -->
        <section>

            <div id="loading-spinner"
                class="hidden items-center justify-center bg-white rounded-md h-[50vh] mt-2 shadow">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
            <div id="card-container"
                class="grid grid-cols-2 lg:grid-cols-4 gap-3 p-5 bg-[#FBFBFB] shadow border-t border-gray-300">

                <!-- single card -->
                <!-- <div class=" border-t-2 border-[#00A96E] rounded-sm bg-white shadow py-4 flex flex-col justify-between"> -->
                <!-- status top -->

                        <div class="badge badge-soft badge-secondary rounded-full">Secondary</div>
                    </div> -->

                            devicesFix navigation menu on mobile devices</h2>
                        <p class="text-[#64748B] text-[12px]">Track and manage your project issues</p>
                        <div class="mt-4">
                            <div
                                class="badge badge-soft badge-warning rounded-full bg-[#FEECEC] text-[#EF4444] py-3 border border-[#FECACA]">
                                <img src="assets/BugDroid.png" alt=""> Bug
                            </div>
                            <div
                                class="badge badge-soft badge-warning rounded-full bg-[#FFF8DB] text-[#D97706] py-3 border border-[#FDE68A]">

                            </div>
                        </div>
                    </div> -->

                <!-- bottom created info -->
                <!-- <div class="border-t border-gray-300 mt-4 px-3 pt-3 space-y-1">

                            by john_doe</p>
                        <p class="text-[#64748B] text-[12px]">1/15/2024</p>

                    </div> -->

            </div>
        </section>

        <dialog id="showIssueDetails" class="modal">
            
        </dialog>
    </main>


    <script src="script/home.js"></script>
