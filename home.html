<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- tailwind and daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style/index.css">
</head>

<body>

    <header class="flex justify-between container w-11/12 mx-auto">
        <div class="flex  items-center gap-1 p-5">
            <img class="max-w-9" src="assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-4 items-center">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute top-3.5 left-4 text-[#64748B] -z-10] "></i>
                <input class="px-5 py-2 pl-10 rounded-md text[#64748B] border border-[#64748B]" type="text" name="" id="search-input" placeholder="search issue" >
            </div>

            <button class="btn btn-primary">+ New issue</button>
        </div>
    </header>


</body>

</html>
